#!/system/bin/sh

# ==============================================================================
#                           Flux Settings Configuration
# ==============================================================================
# Note: Restart service after modifying this file
# Usage: These settings override internal defaults
# ==============================================================================

# ==============================================================================
# [ Updater Configuration ]
# ==============================================================================

# Subscription URL (sing-box compatible)
SUBSCRIPTION_URL=""

# Subscription download timeout (seconds)
UPDATE_TIMEOUT=5

# Download retry count
RETRY_COUNT=2

# Auto-update interval (seconds, 86400=24h, 0=Disable)
UPDATE_INTERVAL=86400

# Cleanup Emoji from node names (0: Keep, 1: Remove)
PREF_CLEANUP_EMOJI=1

# ==============================================================================
# [ Logging & Debugging ]
# ==============================================================================

# 0=OFF, 1=Error, 2=Warn, 3=Info, 4=Debug
LOG_LEVEL=3

# Max log size before rotation (bytes)
LOG_MAX_SIZE=1048576

# ==============================================================================
# [ Core Process ]
# ==============================================================================

# Execution user/group for sing-box
CORE_USER="root"
CORE_GROUP="root"

# Core startup timeout (seconds)
CORE_TIMEOUT=5

# ==============================================================================
# [ Network Interfaces ]
# ==============================================================================

# Interface names (Support wildcard +)
MOBILE_INTERFACE="rmnet_data+"
WIFI_INTERFACE="wlan0"
HOTSPOT_INTERFACE="wlan2"
USB_INTERFACE="rndis+"

# ==============================================================================
# [ Proxy Granularity ]
# ==============================================================================

# Interface switches (0=Bypass, 1=Proxy)
PROXY_MOBILE=1
PROXY_WIFI=1
PROXY_HOTSPOT=1
PROXY_USB=1

# Protocol switches (deprecated - now protocol-agnostic)
PROXY_IPV6=0

# ==============================================================================
# [ Routing Mark ]
# ==============================================================================

# Core/Bypass Routing Mark (empty=use UID owner match)
ROUTING_MARK=""

# ==============================================================================
# [ Application Filtering ]
# ==============================================================================

# 0=Disable, 1=Blacklist (bypass specified apps), 2=Whitelist (proxy only specified apps)
APP_PROXY_MODE=0

# Package names - supports multi-line values in quotes
# Example (newlines INSIDE quotes):
# APP_LIST="com.google.android.youtube
# com.twitter.android
# com.instagram.android"
APP_LIST=""

# ==============================================================================
# [ Performance & Compatibility ]
# ==============================================================================

# Advanced: TCP MSS Clamping to fix carrier network connectivity: 0=Disable, 1=Enable
MSS_CLAMP_ENABLE=1

# List of interfaces to EXPLICITLY ignore (Space-separated, OUTPUT chain)
# These interfaces will bypass proxy even if enabled above
# Example: EXCLUDE_INTERFACES="rmnet_data1 rmnet_data8"
EXCLUDE_INTERFACES=""

# eBPF bypass note:
# CIDR bypass matching is now handled by fluxebpfd (conf/bypass_ipv4.txt, conf/bypass_ipv6.txt).
# scripts/rules no longer embeds or evaluates bypass CIDR lists.

# ==============================================================================
# [ Advanced Updater Filtering ]
# ==============================================================================

# Regex patterns for nodes to EXCLUDE (matched against tag/remarks)
# Example: UPDATER_EXCLUDE_REMARKS="(expire|traffic)"
UPDATER_EXCLUDE_REMARKS="(expire|traffic|官网|到期|流量|剩余|套餐|重置|联系|群组|通知|平台|网站|时间|建议|反馈|版本|更新)"

# Custom Rename Rules (JSON format)
# Example: UPDATER_RENAME_RULES='[{"match":"HK","replace":"Hong Kong"}]'
UPDATER_RENAME_RULES='[
    {"match":"【(亚洲|北美洲|欧洲|南美洲|非洲|大洋洲|南极洲)】","replace":""},
    {"match":"【","replace":"["},
    {"match":"】","replace":"]"}
]'

# Max length for node tags (default: 32)
UPDATER_MAX_TAG_LENGTH=32
